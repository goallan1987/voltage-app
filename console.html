<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Voltage Console — Response Electricians</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cy:#00A4E4;--cy-700:#0784b5;--ink:#0a0a12;--ink2:#13131d;--card:#fff;--line:#e7e7ee;--soft:#f6f7f9;--text:#1a1a22;--muted:#6b7280;--faint:#9aa0aa;--ok:#1E8449;--ok-bg:#e8f7ef;--warn:#9a6a00;--warn-bg:#fdf3e0;--bad:#c0392b;--shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04)}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{background:var(--soft);color:var(--text);font-size:14px;line-height:1.5}
.hide{display:none!important}
/* layout */
.top{height:58px;background:var(--ink);color:#fff;display:flex;align-items:center;gap:16px;padding:0 22px;border-bottom:3px solid var(--cy);position:sticky;top:0;z-index:20}
.top img{height:26px}
.top .ttl{font-weight:800;letter-spacing:.02em;font-size:15px}
.top .sp{flex:1}
.top .who{font-size:12.5px;color:rgba(255,255,255,.7)}
.top .out{background:rgba(255,255,255,.12);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer}
.wrap{display:grid;grid-template-columns:212px 1fr;min-height:calc(100vh - 58px)}
.side{background:#fff;border-right:1px solid var(--line);padding:16px 12px}
.side button{display:flex;align-items:center;gap:10px;width:100%;border:none;background:transparent;color:var(--text);font-size:13.5px;font-weight:600;padding:11px 13px;border-radius:9px;cursor:pointer;text-align:left;margin-bottom:3px}
.side button:hover{background:var(--soft)}
.side button.on{background:rgba(0,164,228,.10);color:var(--cy-700)}
.side .ic{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.side .grp{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:14px 13px 6px}
.main{padding:26px 30px;max-width:1280px}
.h1{font-size:22px;font-weight:800;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:13.5px;margin-top:3px;margin-bottom:20px}
/* cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.kpi .l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.kpi .v{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.02em}
.kpi .v.g{color:var(--ok)}
.panel{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:22px}
.panel h3{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:15px 18px;border-bottom:1px solid var(--line)}
/* table */
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--soft);position:sticky;top:58px}
td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fbfcfd}
.nm{font-weight:700}
.role{font-size:11.5px;color:var(--faint);text-transform:capitalize}
.score{font-weight:800;font-size:15px}
.bar{height:7px;border-radius:9999px;background:var(--line);overflow:hidden;width:84px;margin-top:5px}
.bar i{display:block;height:100%;border-radius:9999px}
.pill{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:9999px}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.bad{background:#fdecea;color:var(--bad)}
.pill.rk{background:rgba(0,164,228,.10);color:var(--cy-700)}
.viewbtn{background:var(--cy);color:#fff;border:none;padding:6px 12px;border-radius:7px;font-weight:700;font-size:11.5px;cursor:pointer}
/* assets */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:16px}
.find{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.find .ph{width:100%;height:150px;background:var(--soft) center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:12px}
.find .bd{padding:11px 13px}
.find h4{font-size:13.5px;font-weight:700;margin-bottom:3px}
.find .mt{font-size:11.5px;color:var(--faint)}
.sev{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;padding:2px 7px;border-radius:9999px;margin-top:7px}
.sev.urgent{background:#fdecea;color:var(--bad)}.sev.recommend{background:var(--warn-bg);color:var(--warn)}.sev.info{background:var(--soft);color:var(--muted)}
.loading{padding:40px;text-align:center;color:var(--faint)}
.tabbar{display:flex;gap:6px;padding:0 18px;border-bottom:1px solid var(--line)}
.tabbar button{border:none;background:transparent;padding:13px 4px;margin-right:16px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tabbar button.on{color:var(--cy-700);border-bottom-color:var(--cy)}
/* login */
.login{max-width:380px;margin:9vh auto;background:#fff;border:1px solid var(--line);border-radius:18px;padding:34px 30px;box-shadow:var(--shadow);text-align:center}
.login img{height:34px;margin-bottom:20px}
.login h1{font-size:20px;font-weight:800}
.login p{color:var(--muted);font-size:13.5px;margin:8px 0 18px}
.login input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:12px}
.login button{width:100%;padding:13px;background:var(--cy);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer}
.fine{font-size:11.5px;color:var(--faint);margin-top:14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:9999px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:50}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:820px){.wrap{grid-template-columns:1fr}.side{display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line)}.side .grp{display:none}.side button{white-space:nowrap;margin-bottom:0}.cards{grid-template-columns:repeat(2,1fr)}.main{padding:18px}}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.gcard{position:relative;border:2px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.gcard.ispass{border-color:rgba(34,197,94,.5)}.gcard.isfail{border-color:rgba(192,57,43,.6)}
.gph{width:100%;height:150px;background:var(--soft) center/cover no-repeat}
.gbadge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:9999px;color:#fff}
.gbadge.pass{background:var(--ok)}.gbadge.fail{background:var(--bad)}
.gbadge.sev-urgent{background:var(--bad)}.gbadge.sev-recommend{background:var(--warn)}.gbadge.sev-info{background:#7a8088}
.gmeta{padding:9px 11px}.gmeta b{display:block;font-size:12.5px;line-height:1.3}.gmeta span{font-size:11px;color:var(--muted)}
</style>
</head>

<script>
const SB_URL="https://afwmwbbqnutojvjkxcwu.supabase.co";
const SB_KEY="sb_publishable_s3Kip0n_LWTYG5QNOB3wYw_Q35jP6gZ";
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
function $(s){return document.querySelector(s)}
function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function money(n){return '$'+Number(n||0).toLocaleString()}
function toast(m){var t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove("show")},2400)}
function col(p){return p>=85?'var(--ok)':p>=65?'var(--cy)':p>=40?'var(--warn)':'var(--bad)'}
function rankPill(r){return '<span class="pill rk">'+esc(r||'Rookie')+'</span>'}
function timeAgo(iso){if(!iso)return'Never';var s=(Date.now()-new Date(iso).getTime())/1000;if(s<3600)return Math.max(1,Math.round(s/60))+'m ago';if(s<86400)return Math.round(s/3600)+'h ago';return Math.round(s/86400)+'d ago'}

function show(id){["app","login","denied"].forEach(function(x){$("#"+x).classList.add("hide")});$("#"+id).classList.remove("hide")}
function nav(v){document.querySelectorAll('.side button[data-v]').forEach(function(b){b.classList.toggle('on',b.dataset.v===v)});if(v==='perf')renderPerf();if(v==='adopt')renderAdopt();if(v==='assets')renderAssets();if(v==='gallery')renderGallery()}

async function sendLink(){var e=($("#email").value||"").trim().toLowerCase();if(!e){toast("Enter your email");return;}var r=await sb.auth.signInWithOtp({email:e,options:{emailRedirectTo:location.origin+location.pathname,shouldCreateUser:true}});if(r.error){toast(r.error.message);return;}$("#loginfine").textContent="Magic link sent to "+e+" — open it on this device.";toast("Magic link sent");}
async function signOut(){await sb.auth.signOut();show("login");}

async function boot(){
 var u=(await sb.auth.getUser()).data.user; $("#who").textContent=(u&&u.email)||"";
 // admin check via first RPC
 var r=await sb.rpc("app_admin_scoreboard");
 if(r.error){toast("Load error");return;}
 if(!r.data||!r.data.ok){ if(r.data&&r.data.error==='not authorised'){show("denied");return;} }
 show("app"); SCOREBOARD=(r.data&&r.data.team)||[]; renderPerf();
}

var SCOREBOARD=[], USAGE=[], ASSETS=null;
// PERFORMANCE
function renderPerf(){
 var m=$("#main"); var t=SCOREBOARD;
 var withAcc=t.filter(function(x){return x.has_account});
 var avg=withAcc.length?Math.round(withAcc.reduce(function(a,b){return a+(b.overall||0)},0)/withAcc.length):0;
 var jobs=t.reduce(function(a,b){return a+(b.jobs_closed||0)},0);
 var comm=t.reduce(function(a,b){return a+Number(b.commission||0)},0);
 var finds=t.reduce(function(a,b){return a+(b.findings||0)},0);
 var rows=t.slice().sort(function(a,b){return (b.overall||0)-(a.overall||0)}).map(function(p){
  return '<tr><td><div class="nm">'+esc(p.name)+'</div><div class="role">'+esc((p.role||'').replace(/_/g,' '))+'</div></td>'+
   '<td>'+(p.has_account?('<div class="score" style="color:'+col(p.overall)+'">'+p.overall+'</div><div class="bar"><i style="width:'+p.overall+'%;background:'+col(p.overall)+'"></i></div>'):'<span class="pill bad">No account</span>')+'</td>'+
   '<td>'+rankPill(rankOf(p.overall))+'</td>'+
   '<td>'+(p.efficiency||0)+'%</td><td>'+(p.compliance||0)+'%</td>'+
   '<td>'+(p.jobs_closed||0)+'</td><td>'+money(p.commission)+'</td><td>'+(p.findings||0)+'</td><td>'+(p.reviews||0)+'</td>'+
   '<td class="role">'+timeAgo(p.last_active)+'</td></tr>';
 }).join("");
 m.innerHTML='<div class="h1">Team performance</div><div class="sub">Last 30 days · every field technician, ranked by overall job score.</div>'+
  '<div class="cards"><div class="kpi"><div class="l">Team avg score</div><div class="v" style="color:'+col(avg)+'">'+avg+'</div></div>'+
  '<div class="kpi"><div class="l">Jobs closed</div><div class="v">'+jobs+'</div></div>'+
  '<div class="kpi"><div class="l">Commission</div><div class="v g">'+money(comm)+'</div></div>'+
  '<div class="kpi"><div class="l">Findings logged</div><div class="v">'+finds+'</div></div></div>'+
  '<div class="panel"><table><thead><tr><th>Technician</th><th>Score</th><th>Rank</th><th>Efficiency</th><th>Compliance</th><th>Jobs</th><th>Commission</th><th>Findings</th><th>Reviews</th><th>Last active</th></tr></thead><tbody>'+(rows||'<tr><td colspan="10" class="loading">No data yet.</td></tr>')+'</tbody></table></div>';
}
function rankOf(o){return o>=85?'Legend':o>=65?'All-Star':o>=40?'Pro':'Rookie'}

// ADOPTION
async function renderAdopt(){
 var m=$("#main");m.innerHTML='<div class="h1">App adoption</div><div class="sub">Who is actually using Voltage — and who needs a nudge.</div><div class="loading">Loading…</div>';
 var r=await sb.rpc("app_admin_usage"); var t=(r.data&&r.data.team)||[]; USAGE=t;
 var active=t.filter(function(x){return x.events_7d>0}).length, noacc=t.filter(function(x){return !x.has_account}).length;
 var rows=t.map(function(p){
  var badge=!p.has_account?'<span class="pill bad">No account</span>':(p.events_7d>0?'<span class="pill ok">Active</span>':'<span class="pill warn">Idle</span>');
  return '<tr><td><div class="nm">'+esc(p.name)+'</div><div class="role">'+esc((p.role||'').replace(/_/g,' '))+'</div></td><td>'+badge+'</td><td class="role">'+timeAgo(p.last_active)+'</td><td>'+p.days_active_30d+'</td><td>'+p.tasks_7d+'</td><td>'+p.jobs_closed_30d+'</td><td>'+p.findings_30d+'</td></tr>';
 }).join("");
 m.innerHTML='<div class="h1">App adoption</div><div class="sub">Who is actually using Voltage — and who needs a nudge.</div>'+
  '<div class="cards"><div class="kpi"><div class="l">On the tools</div><div class="v">'+t.length+'</div></div><div class="kpi"><div class="l">Active this week</div><div class="v g">'+active+'</div></div><div class="kpi"><div class="l">Never logged in</div><div class="v" style="color:var(--bad)">'+noacc+'</div></div><div class="kpi"><div class="l">Adoption</div><div class="v">'+(t.length?Math.round(active/t.length*100):0)+'%</div></div></div>'+
  '<div class="panel"><table><thead><tr><th>Technician</th><th>Status</th><th>Last active</th><th>Active days (30d)</th><th>Tasks (7d)</th><th>Jobs closed (30d)</th><th>Findings (30d)</th></tr></thead><tbody>'+(rows||'<tr><td colspan="7" class="loading">No data.</td></tr>')+'</tbody></table></div>';
}

// ASSETS
var ASSET_TAB='findings';
async function renderAssets(){
 var m=$("#main");m.innerHTML='<div class="h1">Assets &amp; reports</div><div class="sub">Photos, findings, Health Reports and close-outs captured in the field.</div><div class="loading">Loading…</div>';
 var r=await sb.rpc("app_admin_assets",{p_days:90}); ASSETS=(r.data&&r.data.ok)?r.data:{findings:[],reports:[],closeouts:[]};
 m.innerHTML='<div class="h1">Assets &amp; reports</div><div class="sub">Photos, findings, Health Reports and close-outs captured in the field · last 90 days.</div>'+
  '<div class="panel"><div class="tabbar"><button data-a="findings" class="on" onclick="assetTab(\'findings\')">Findings &amp; photos ('+ASSETS.findings.length+')</button><button data-a="reports" onclick="assetTab(\'reports\')">Health Reports ('+ASSETS.reports.length+')</button><button data-a="closeouts" onclick="assetTab(\'closeouts\')">Close-outs ('+ASSETS.closeouts.length+')</button></div><div id="assetBody"></div></div>';
 assetTab('findings');
}
function assetTab(a){ASSET_TAB=a;document.querySelectorAll('.tabbar button').forEach(function(b){b.classList.toggle('on',b.dataset.a===a)});var b=$("#assetBody");
 if(a==='findings'){ if(!ASSETS.findings.length){b.innerHTML='<div class="loading">No findings logged yet.</div>';return;}
   b.innerHTML='<div class="grid">'+ASSETS.findings.map(function(f,i){var sev=(f.severity||'recommend');
    return '<div class="find"><div class="ph" id="ph'+i+'">No photo</div><div class="bd"><h4>'+esc(f.title||'Finding')+'</h4><div class="mt">'+esc(f.tech||'—')+' · Job #'+f.job_id+(f.location?(' · '+esc(f.location)):'')+'</div><span class="sev '+sev+'">'+sev+'</span></div></div>'}).join("")+'</div>';
   ASSETS.findings.forEach(function(f,i){if(f.photos&&f.photos.length){signImg('ph'+i,f.photos[0])}});
 } else if(a==='reports'){ if(!ASSETS.reports.length){b.innerHTML='<div class="loading">No Health Reports yet.</div>';return;}
   b.innerHTML='<table><thead><tr><th>Job</th><th>Findings</th><th>Value</th><th>Sent</th><th>Created</th></tr></thead><tbody>'+ASSETS.reports.map(function(r){return '<tr><td>#'+r.job_id+'</td><td>'+r.findings+'</td><td>'+money(r.total_value)+'</td><td>'+(r.sent_at?'<span class="pill ok">Sent</span>':'<span class="pill warn">Draft</span>')+'</td><td class="role">'+timeAgo(r.created_at)+'</td></tr>'}).join("")+'</tbody></table>';
 } else { if(!ASSETS.closeouts.length){b.innerHTML='<div class="loading">No close-outs yet.</div>';return;}
   b.innerHTML='<table><thead><tr><th>Job</th><th>Tech</th><th>Testing</th><th>Photos</th><th>Items</th><th>Materials</th><th>When</th></tr></thead><tbody>'+ASSETS.closeouts.map(function(c){return '<tr><td>#'+c.job_id+'</td><td>'+esc(c.tech||'—')+'</td><td>'+(c.testing?'<span class="pill ok">Yes</span>':'<span class="pill bad">No</span>')+'</td><td>'+(c.photos?'<span class="pill ok">Yes</span>':'<span class="pill bad">No</span>')+'</td><td>'+c.items+'</td><td>'+c.materials+'</td><td class="role">'+timeAgo(c.created_at)+'</td></tr>'}).join("")+'</tbody></table>';
 }
}
async function signImg(elId,path){try{var s=await sb.storage.from("job-photos").createSignedUrl(path,3600);if(s.data&&s.data.signedUrl){var el=$("#"+elId);if(el){el.style.backgroundImage='url('+s.data.signedUrl+')';el.textContent='';}}}catch(e){}}

async function renderGallery(){
 var m=$("#main");m.innerHTML='<div class="h1">Image gallery</div><div class="sub">Every photo from the field, named, with pass/fail \u2014 last 60 days.</div><div class="loading">Loading images…</div>';
 var r=await sb.rpc("app_admin_gallery",{p_days:60});var imgs=(r.data&&r.data.ok)?(r.data.images||[]):[];
 var pass=imgs.filter(function(x){return x.status==='pass'}).length,fail=imgs.filter(function(x){return x.status==='fail'}).length;
 var cards=imgs.map(function(im,i){var st=im.status;var badge=st==='pass'?'<span class="gbadge pass">PASS</span>':st==='fail'?'<span class="gbadge fail">FAIL</span>':'<span class="gbadge sev-'+st+'">'+esc(st)+'</span>';
  return '<div class="gcard '+(st==='fail'?'isfail':st==='pass'?'ispass':'')+'"><div class="gph" id="g'+i+'"></div>'+badge+'<div class="gmeta"><b>'+esc(im.name)+'</b><span>#'+im.job_id+' \u00b7 '+esc(im.tech||'\u2014')+'</span></div></div>'}).join("");
 m.innerHTML='<div class="h1">Image gallery</div><div class="sub">Every photo from the field, named, with pass/fail \u2014 last 60 days. No more clicking into each one.</div><div class="cards"><div class="kpi"><div class="l">Images</div><div class="v">'+imgs.length+'</div></div><div class="kpi"><div class="l">Passed</div><div class="v g">'+pass+'</div></div><div class="kpi"><div class="l">Failed</div><div class="v" style="color:var(--bad)">'+fail+'</div></div><div class="kpi"><div class="l">Findings</div><div class="v">'+(imgs.length-pass-fail)+'</div></div></div><div class="gallery">'+(cards||'<div class="loading">No images yet.</div>')+'</div>';
 imgs.forEach(function(im,i){signG('g'+i,im.path)});
}
async function signG(id,path){try{var s=await sb.storage.from("job-photos").createSignedUrl(path,3600);if(s.data&&s.data.signedUrl){var el=$("#"+id);if(el)el.style.backgroundImage='url('+s.data.signedUrl+')';}}catch(e){}}
// init
(async function(){try{var s=await sb.auth.getSession();if(s.data.session){boot();}else{show("login");}}catch(e){show("login");}})();
sb.auth.onAuthStateChange(function(ev,sess){if(ev==="SIGNED_IN"&&sess){boot();}});
</script>
